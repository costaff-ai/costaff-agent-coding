services:
  agent-coding:
    build:
      context: ./agent
    container_name: costaff-agent-coding
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - PUBLIC_HOST=localhost
      - MCP_CODING_URL=http://costaff-mcp-coding:8082/mcp
      - WORKSPACE_DIR=/app/data
      - AGENT_CODING_WORKSPACE_DIR=/app/data/agent-coding
      - COSTAFF_AGENT_MODEL_PROVIDER=${COSTAFF_AGENT_MODEL_PROVIDER:-gemini}
      - CODING_AGENT_MODEL=${CODING_AGENT_MODEL:-gemini-2.5-flash}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME:-}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
    volumes:
      - costaff_data:/app/data
    depends_on:
      - costaff-mcp-coding

  costaff-mcp-coding:
    build:
      context: ./mcp
    container_name: costaff-mcp-coding
    restart: on-failure
    environment:
      - MCP_CODING_PORT=8082
      - WORKSPACE_DIR=/app/data
      - AGENT_CODING_WORKSPACE_DIR=/app/data/agent-coding
      - ALLOW_PIP_INSTALL=${ALLOW_PIP_INSTALL:-true}
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Coding Agent}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-agent@costaff.ai}
    volumes:
      - costaff_data:/app/data

volumes:
  costaff_data:
    name: costaff_data
