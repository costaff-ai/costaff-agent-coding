services:
  coding-agent:
    build:
      context: ./agent
    restart: on-failure
    environment:
      - PORT=8081
      - PUBLIC_HOST=coding-agent
      - MCP_CODING_URL=http://mcp-coding:8082/mcp
      - CODING_WORKSPACE_DIR=/app/data/coding_workspace
      - MATECLAW_AGENT_MODEL_PROVIDER=${MATECLAW_AGENT_MODEL_PROVIDER:-gemini}
      - CODING_AGENT_MODEL=${CODING_AGENT_MODEL:-gemini-2.5-flash}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME:-}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
    volumes:
      - coding_data:/app/data
    depends_on:
      - mcp-coding

  mcp-coding:
    build:
      context: ./mcp
    restart: on-failure
    environment:
      - MCP_CODING_PORT=8082
      - CODING_WORKSPACE_DIR=/app/data/coding_workspace
      - ALLOW_PIP_INSTALL=${ALLOW_PIP_INSTALL:-true}
    volumes:
      - coding_data:/app/data

volumes:
  coding_data:
